name: CI

# Responsibility: don't let a broken change land. Builds, tests, and
# publishes every module to the local Maven repository (never to Maven
# Central) so publication wiring is exercised without needing release
# secrets. Runs on every push and every PR into master.
on:
  push:
    branches:
      - master
      - claude
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | ${ANDROID_SDK_ROOT:-$ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify repository (build + test + publishToMavenLocal + artifact checks)
        # spatialRelease is intentionally left unset here: signAllPublications()
        # never runs in CI, so no signing key is required for this workflow.
        run: ./gradlew --no-daemon verifyRepository
